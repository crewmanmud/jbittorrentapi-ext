# JitPack build configuration.
# JitPack builds this repo on-demand (from a git tag/branch/commit) and serves
# the artifact anonymously as com.github.crewmanmud:jbittorrentapi-ext:<ref>.
#
# openjdk11 supports the project's release=8 bytecode target. We build with the
# committed Maven Wrapper (./mvnw -> Maven 3.9.9) because JitPack's default Maven
# is too old for maven-compiler-plugin 3.13.0 (which needs Maven >= 3.6.3).
jdk:
  - openjdk11
install:
  - ./mvnw install -DskipTests -B

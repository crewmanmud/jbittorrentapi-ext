# JitPack build configuration.
# JitPack builds this repo on-demand (from a git tag/branch/commit) and serves
# the artifact anonymously as com.github.crewmanmud:jbittorrentapi-ext:<ref>.
#
# openjdk11 supports the project's release=8 bytecode target and the
# compiler/shade/source plugin versions, and avoids JitPack's older default JDK.
jdk:
  - openjdk11
install:
  - mvn install -DskipTests -B
